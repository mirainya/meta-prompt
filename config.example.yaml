server:
  port: 9874

database:
  host: localhost
  port: 5432
  user: meta_prompt
  password: your_password
  dbname: meta_prompt
  sslmode: disable

llm:
  claude:
    api_key: your_claude_key
    model: claude-sonnet-4-6
    max_tokens: 4096
  openai:
    api_key: your_openai_key
    model: gpt-4o
    max_tokens: 4096
  gemini:
    api_key: your_gemini_key
    model: gemini-2.5-pro
    max_tokens: 4096

defaults:
  llm_provider: claude
  temperature: 0.7

auth:
  jwt_secret: your_jwt_secret
