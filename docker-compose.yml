services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_USER=metaprompt
      - DATABASE_PASSWORD=metaprompt
      - DATABASE_DBNAME=metaprompt
      - DATABASE_SSLMODE=disable
      - AUTH_JWT_SECRET=change-me-in-production
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./config.yaml:/app/config.yaml:ro

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: metaprompt
      POSTGRES_PASSWORD: metaprompt
      POSTGRES_DB: metaprompt
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metaprompt"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
